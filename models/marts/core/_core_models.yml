version: 2

models:
  - name: mart_order_revenue
    description: >
      Single source of truth for order-level revenue.
      PRD: docs/prds/mart_order_revenue.md | Issue: #42
    columns:
      - name: order_id
        description: Primary key. One row per order.
        tests:
          - unique
          - not_null

      - name: total_item_revenue
        description: Sum of product prices for the order.

      - name: total_freight
        description: Sum of freight charges.

      - name: total_payment
        description: Actual amount paid.

      - name: order_status
        tests:
          - not_null

  - name: mart_seller_performance
    description: >
      Seller-level performance metrics including GMV, on-time delivery rate, and review scores.
      PRD: docs/prds/mart_seller_performance.md | Issue: #72
    columns:
      - name: seller_id
        description: Primary key. One row per seller.
        tests:
          - unique
          - not_null

      - name: total_gmv
        description: Gross revenue from this seller's items.
        tests:
          - not_null

      - name: on_time_delivery_rate
        description: Share of delivered orders that arrived on or before the estimated date.

      - name: seller_tier
        description: Performance tier derived from total GMV via classify_tier macro.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['platinum', 'gold', 'silver', 'bronze']